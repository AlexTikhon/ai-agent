name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9.4.0
  NODE_VERSION: 20

jobs:
  # ── Job 1: Lint + Typecheck ─────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required before typecheck)
        run: pnpm --filter @book/types build

      - name: Generate Prisma client
        run: pnpm --filter @book/api prisma:generate

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

  # ── Job 2: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storyme
          POSTGRES_PASSWORD: storyme_ci
          POSTGRES_DB: storyme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://storyme:storyme_ci@localhost:5432/storyme_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long-padding
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-padding
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      OPENAI_API_KEY: sk-test-placeholder
      FAL_API_KEY: test-placeholder
      R2_ACCOUNT_ID: test
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_BUCKET_NAME: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @book/types build

      - name: Generate Prisma client
        run: pnpm --filter @book/api prisma:generate

      - name: Run database migrations
        run: pnpm --filter @book/api prisma:migrate:deploy

      - name: Run tests
        run: pnpm test

  # ── Job 3: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @book/api prisma:generate

      - name: Build all packages and apps
        run: pnpm build
        env:
          # Required for Next.js build (can be empty in CI)
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
